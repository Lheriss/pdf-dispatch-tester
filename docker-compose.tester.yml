# docker-compose.tester.yml — pdf-dispatch-tester (runner pytest)
#
# Déployer comme stack Portainer nommée "pdf-dispatch-tester".
# Pour lancer les tests : Portainer → stack → container → Recreate.

services:
  pdf-dispatch-tester:
    image: ghcr.io/lheriss/pdf-dispatch-tester:latest
    container_name: pdf-dispatch-tester
    restart: "no"    # one-shot : s'arrête quand pytest se termine

    environment:
      # ── Connexion à pdf-dispatch-test ──────────────────────────────────────
      TESTER_SERVER:  "http://pdf-dispatch-test:5000"
      TESTER_API_KEY: "${TEST_API_KEY:-pdf-dispatch-test-key}"
      TESTER_DATA:    "/data"

      # ── Sélection des tests ─────────────────────────────────────────────────
      # Exemples :
      #   "-v --tb=short"                   → tous les tests
      #   "-v -m processing"                → Phase 1 seulement
      #   "-v tests/test_00_generator.py"   → Phase 0 (sans serveur)
      #   "-v -k test_before_keep"          → un test précis
      PYTEST_ARGS: "${PYTEST_ARGS:--v --tb=short}"

      # ── Email (Phase 4 — optionnel) ─────────────────────────────────────────
      # SMTP_HOST:     "smtp.gmail.com"
      # SMTP_PORT:     "587"
      # SMTP_USER:     "pdf-dispatch-test@gmail.com"
      # SMTP_PASSWORD: "your-app-password"
      # IMAP_HOST:     "imap.gmail.com"
      # IMAP_PORT:     "993"
      # IMAP_USER:     "pdf-dispatch-test@gmail.com"
      # IMAP_PASSWORD: "your-app-password"
      # IMAP_FOLDER:   "INBOX"

    volumes:
      # Même répertoire data que pdf-dispatch-test
      - "${DATA_VOLUME_TEST:-/tmp/pdf-dispatch-test}:/data"
      # Logs et rapports persistants sur le NAS
      - "${TESTER_LOGS:-/tmp/pdf-dispatch-tester-logs}:/app/logs"
      - "${TESTER_REPORT:-/tmp/pdf-dispatch-tester-report}:/app/report"

    networks:
      - test-network

networks:
  test-network:
    external: true
    name: pdf-dispatch-test_default
