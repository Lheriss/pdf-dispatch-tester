[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test
python_functions = test_

# Default report
addopts = -v --tb=short --html=report/report.html --self-contained-html

# Phases can be filtered with -m:
#   pytest -m "not email"        — skip email tests
#   pytest -m "not filedrop"     — skip semi-auto tests
#   pytest tests/test_00_generator.py  — generator self-tests only (no server needed)
markers =
    api:       REST API tests (requires running instance)
    processing: PDF splitting behaviour tests
    webhook:   Outbound webhook tests
    email:     IMAP email ingestion tests (requires test email account)
    filedrop:  File-drop tests (semi-automated — requires manual action)
    slow:      Tests that may take >10 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
