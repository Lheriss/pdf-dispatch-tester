[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test
python_functions = test_

# --html is set by entrypoint.sh with a timestamp so each run creates a new file.
# When running locally without entrypoint.sh, a default report is still generated.
addopts = -v --tb=short --html=report/report.html --self-contained-html

markers =
    api:       REST API tests (requires running instance)
    processing: PDF splitting behaviour tests
    webhook:   Outbound webhook tests
    email:     IMAP email ingestion tests (requires test email account)
    filedrop:  File-drop tests (semi-automated — requires manual action)
    slow:      Tests that may take >10 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
