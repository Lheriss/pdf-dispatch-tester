version: "3.8"

services:

  pdf-dispatch-test:
    image: ghcr.io/lheriss/pdf-dispatch:latest
    container_name: pdf-dispatch-test
    restart: unless-stopped

    environment:
      DATA_DIR: /data
      PUID:     "1026"
      PGID:     "100"
      TZ:       "Europe/Zurich"
      # APP_VERSION is injected at build time via ARG GIT_SHA in the Dockerfile.
      # Do NOT set it here — a docker-compose value would override the build arg
      # and break the SHA tracing in /api/runtime and session.log.
      API_KEY:      "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      EMAIL_SECRET: "0b6af7640f76309263617563d2a365dd8016cc02584a2d58ffc5eadd6b573b72"

      # ── Barcode scanning ─────────────────────────────────────────────────────
      BARCODE_SCANNER:  ZXING
      BARCODE_DPI:      "300"   # Pass 2 — high-res re-decode on pages where a code
                                #  was detected in pass 1.  300 DPI = maximum accuracy.
      BARCODE_DPI_SCAN: "200"   # Pass 1 — fast scan of all pages to locate codes.
                                #  200 DPI = production default → tests the real behavior.
                                #  Pages where a code is detected are re-scanned at
                                #  BARCODE_DPI (300) for full accuracy (two-pass mode).

      # ── Logging & stability ───────────────────────────────────────────────────
      MAX_LOG_ENTRIES:      "500"
      FILE_STABLE_TIMEOUT:  "15"
      FILE_STABLE_INTERVAL: "1"

      # ── Resource limits (intentionally tighter than prod for test coverage) ───
      MAX_UPLOAD_MB:             "20"   # test_email_attachment_too_large expects <20 MB guard
      MAX_PAGES:                 "50"   # test_email_max_pages sends 60-page PDF → rejected
      MAX_CONCURRENT_PROCESSING: "2"
      MAX_WORKER_THREADS:        "8"    # max(8, MAX_CONCURRENT_PROCESSING + 4) = 8

      # ── Timeouts ─────────────────────────────────────────────────────────────
      API_TASK_TIMEOUT: "120"

      # ── Security (disabled for tests — tester calls localhost webhooks) ───────
      SSRF_PROTECTION: "off"

    volumes:
      - "/volume1/docker/pdf_test/data:/data"

    mem_limit: 1536m
    memswap_limit: 1536m

    ports:
      - "5881:5000"   # pdf-dispatch UI
      - "5883:5883"   # tester web UI (partagé via network_mode: service:)

  pdf-dispatch-tester:
    image: ghcr.io/lheriss/pdf-dispatch-tester:latest
    # Pas de container_name : incompatible avec network_mode: service:
    restart: unless-stopped
    network_mode: "service:pdf-dispatch-test"
    shm_size: '512m'   # Chromium (Playwright) needs >=256 MB shared memory

    depends_on:
      pdf-dispatch-test:
        condition: service_healthy
      greenmail:
        condition: service_started

    environment:
      # Réseau partagé → localhost:5000 = pdf-dispatch
      TESTER_SERVER:  "http://localhost:5000"
      WEBHOOK_HOST:   "localhost"

      TESTER_API_KEY: "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      TESTER_DATA:    "/data"
      WEBHOOK_PORT:   "5882"
      TZ:             "Europe/Zurich"

      WEB_MODE:   "1"
      WEB_PORT:   "5883"
      # PYTEST_ARGS: "-v --tb=short"  # WEB_MODE=0 seulement

    volumes:
      - "/volume1/docker/pdf_test/data:/data"
      - "/volume1/docker/pdf_test/logs:/app/logs"
      - "/volume1/docker/pdf_test/report:/app/report"

  # ── Greenmail — lightweight IMAP/SMTP server for Phase 4 email tests ─────
  greenmail:
    image: greenmail/standalone:2.0.1
    restart: unless-stopped
    environment:
      # Single line — avoid YAML folding ambiguity with Portainer.
      # Domain @greenmail matches the container hostname → no external DNS lookup.
      # Format Greenmail 2.x : login:password@domain
      #   login   = local-part only  (pdftester)
      #   domain  = after the @      (@greenmail)
      #   IMAP LOGIN uses login only (not the full email address)
      # → IMAP user = pdftester  /  password = pdftester  /  email = pdftester@greenmail
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.users=pdftester:pdftester@greenmail -Dgreenmail.hostname=greenmail -Dgreenmail.verbose=false"
    # Logs consultables via Portainer → container log viewer (pas d'entrypoint override)
