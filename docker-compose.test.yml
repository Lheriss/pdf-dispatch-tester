# docker-compose.test.yml — pdf-dispatch TEST instance
#
# Déployer comme stack Portainer nommée "pdf-dispatch-test".
# Voir README.md → Déploiement dans Portainer.

services:
  pdf-dispatch-test:
    image: ghcr.io/lheriss/pdf-dispatch:latest
    container_name: pdf-dispatch-test
    restart: unless-stopped

    environment:
      DATA_DIR: /data
      PUID:     "${PUID:-1000}"
      PGID:     "${PGID:-1000}"
      TZ:       "${TZ:-Europe/Zurich}"

      APP_VERSION: "test"

      # Clé API fixe pour que les tests n'aient pas à la découvrir
      API_KEY: "${TEST_API_KEY:-pdf-dispatch-test-key}"

      # Clé de chiffrement email — générer avec : openssl rand -hex 32
      EMAIL_SECRET: "${EMAIL_SECRET_TEST:-}"

      BARCODE_SCANNER:      ZXING
      BARCODE_DPI:          "300"
      MAX_LOG_ENTRIES:      "500"

      # Timeouts courts pour des cycles de test plus rapides
      FILE_STABLE_TIMEOUT:  "15"
      FILE_STABLE_INTERVAL: "1"

    volumes:
      - "${DATA_VOLUME_TEST:-/tmp/pdf-dispatch-test}:/data"

    ports:
      - "5881:5000"
