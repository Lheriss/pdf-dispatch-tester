version: "3.8"

services:

  pdf-dispatch-test:
    image: ghcr.io/lheriss/pdf-dispatch:latest
    container_name: pdf-dispatch-test
    restart: unless-stopped

    environment:
      DATA_DIR: /data
      PUID:     "1026"
      PGID:     "100"
      TZ:       "Europe/Zurich"
      APP_VERSION: "test"
      API_KEY:      "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      EMAIL_SECRET: "0b6af7640f76309263617563d2a365dd8016cc02584a2d58ffc5eadd6b573b72"
      BARCODE_SCANNER:      ZXING
      BARCODE_DPI:          "300"
      MAX_LOG_ENTRIES:      "500"
      FILE_STABLE_TIMEOUT:  "15"
      FILE_STABLE_INTERVAL: "1"

    volumes:
      - "/volume1/docker/pdf_test/data:/data"

    ports:
      - "5881:5000"

  pdf-dispatch-tester:
    image: ghcr.io/lheriss/pdf-dispatch-tester:latest
    restart: unless-stopped

    depends_on:
      pdf-dispatch-test:
        condition: service_healthy

    environment:
      # Les deux containers sont sur le même réseau Docker (même compose) :
      # Docker DNS résout "pdf-dispatch-test" et "pdf-dispatch-tester" directement.
      TESTER_SERVER:  "http://pdf-dispatch-test:5000"
      WEBHOOK_HOST:   "pdf-dispatch-tester"

      TESTER_API_KEY: "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      TESTER_DATA:    "/data"
      WEBHOOK_PORT:   "5882"
      TZ:             "Europe/Zurich"

      WEB_MODE:   "1"
      WEB_PORT:   "5883"
      # PYTEST_ARGS: "-v --tb=short"  # utilisé seulement si WEB_MODE=0

    volumes:
      - "/volume1/docker/pdf_test/data:/data"
      - "/volume1/docker/pdf_test/logs:/app/logs"
      - "/volume1/docker/pdf_test/report:/app/report"

    ports:
      - "5883:5883"
