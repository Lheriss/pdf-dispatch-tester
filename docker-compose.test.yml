version: "3.8"

# Les deux containers partagent automatiquement le réseau de ce stack.
# pdf-dispatch-tester atteint pdf-dispatch-test via http://pdf-dispatch-test:5000
# pdf-dispatch-test rappelle le webhook via http://pdf-dispatch-tester:<port>
# — aucun IP externe ni configuration réseau nécessaire.
#
# Portainer → stack pdf-dispatch-test → container pdf-dispatch-tester → Recreate
# pour relancer les tests.

services:

  pdf-dispatch-test:
    image: ghcr.io/lheriss/pdf-dispatch:latest
    container_name: pdf-dispatch-test
    restart: unless-stopped

    environment:
      DATA_DIR: /data
      PUID:     "1026"
      PGID:     "100"
      TZ:       "Europe/Zurich"
      APP_VERSION: "test"
      API_KEY:      "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      EMAIL_SECRET: "0b6af7640f76309263617563d2a365dd8016cc02584a2d58ffc5eadd6b573b72"
      BARCODE_SCANNER:      ZXING
      BARCODE_DPI:          "300"
      MAX_LOG_ENTRIES:      "500"
      FILE_STABLE_TIMEOUT:  "15"
      FILE_STABLE_INTERVAL: "1"

    volumes:
      - "/volume1/docker/pdf_test/data:/data"

    ports:
      - "5881:5000"

  pdf-dispatch-tester:
    image: ghcr.io/lheriss/pdf-dispatch-tester:latest
    container_name: pdf-dispatch-tester
    restart: "no"

    depends_on:
      - pdf-dispatch-test

    environment:
      # Réseau interne Docker — pas d'IP externe nécessaire
      TESTER_SERVER: "http://pdf-dispatch-test:5000"
      WEBHOOK_HOST:  "pdf-dispatch-tester"

      TESTER_API_KEY: "53b9ac3d008b42d0c12c5bf7a24ca55632c1bbfba74f98c2dc40c1d0c0687fff"
      TESTER_DATA:    "/data"
      WEBHOOK_PORT:   "5882"

      PYTEST_ARGS: "-v --tb=short"

      # Email — Phase 4 (optionnel)
      # SMTP_HOST:     "smtp.gmail.com"
      # SMTP_PORT:     "587"
      # SMTP_USER:     "pdf-dispatch-test@gmail.com"
      # SMTP_PASSWORD: "your-app-password"
      # IMAP_HOST:     "imap.gmail.com"
      # IMAP_PORT:     "993"
      # IMAP_USER:     "pdf-dispatch-test@gmail.com"
      # IMAP_PASSWORD: "your-app-password"
      # IMAP_FOLDER:   "INBOX"

    volumes:
      - "/volume1/docker/pdf_test/data:/data"
      - "/volume1/docker/pdf_test/logs:/app/logs"
      - "/volume1/docker/pdf_test/report:/app/report"
