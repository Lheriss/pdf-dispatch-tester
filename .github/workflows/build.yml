name: Build & publish tester image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      - name: Syntax check
        run: |
          python3 -c "import ast; [ast.parse(open(f).read()) for f in [
            'pdf_generator.py','file_dropper.py','helpers.py',
            'tester_logger.py','conftest.py'
          ]]; print('OK')"

      - name: Phase 0 self-tests (no server needed)
        run: pytest tests/test_00_generator.py -v --tb=short --no-header

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/pdf-dispatch-tester" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
